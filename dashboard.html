<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="design.css">
</head>

<body>

<div class="app">

<header class="topbar">
<h1>Health Analytics Dashboard</h1>
<p>Personal Health Insights</p>
</header>

<div class="card">

<input type="number" id="age" placeholder="Age">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">

<button id="calcBtn">Run Analysis</button>

</div>

<div class="stats-grid">

<div class="stat-card">
<h3>BMI</h3>
<p id="result">--</p>
</div>

<div class="stat-card">
<h3>Calories</h3>
<p id="caloriesBox">--</p>
</div>

<div class="stat-card">
<h3>Health Score</h3>
<p id="healthScore">--</p>
</div>

<div class="stat-card">
<h3>Risk Level</h3>
<p id="riskLevel">--</p>
</div>

<div class="stat-card full">
<h3>Recommendation</h3>
<p id="suggestion">Enter details above.</p>
</div>

</div>

<button class="secondary-btn" onclick="goWorkout()">
Workout Analytics →
</button>

</div>

<script src="script.js"></script>

<script>
function goWorkout(){
window.location.href="workout.html";
}
</script>

</body>
</html>
