<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2563eb,#7c3aed,#06b6d4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{
max-width:760px;
padding:40px 25px;
text-align:center;
}

h1{
font-size:56px;
margin-bottom:10px;
}

p{
font-size:20px;
opacity:0.95;
}

.hero{
width:260px;
border-radius:20px;
margin:28px auto;
box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:24px;
text-align:left;
}

.box{
background:rgba(255,255,255,0.14);
padding:16px;
border-radius:14px;
}

button{
margin-top:30px;
padding:16px 34px;
font-size:18px;
border:none;
border-radius:12px;
background:white;
color:#2563eb;
font-weight:bold;
cursor:pointer;
}

@media(max-width:700px){
.grid{grid-template-columns:1fr;}
h1{font-size:40px;}
}
</style>
</head>

<body>

<div class="container">

<h1>FitTrack Pro</h1>

<p>Smart Health Data Analytics Platform</p>

<img class="hero" src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80">

<div class="grid">

<div class="box">📊 Analyze BMI, Calories & Body Metrics</div>

<div class="box">📈 Visualize Daily Fitness Progress</div>

<div class="box">🧠 Personalized Recommendations</div>

<div class="box">📉 Track Health Risk Indicators</div>

</div>

<button onclick="startNow()">Launch Dashboard →</button>

</div>

<script>
function startNow(){
window.location.href="dashboard.html";
}
</script>

</body>
</html>
