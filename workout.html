<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

<div class="container">
  <h1>Workout Tracker</h1>
  <p>Track your daily fitness</p>

  <!-- INPUT -->
  <input type="text" id="workout" placeholder="Workout (Running, Yoga)">
  <input type="number" id="minutes" placeholder="Minutes">

  <button onclick="saveWorkout()">Save Workout</button>

  <!-- IMAGES -->
  <h3>Workout Ideas</h3>
  <img src="https://images.unsplash.com/photo-1599058917212-d750089bc07e" width="100%" style="margin-top:10px;">
  <img src="https://images.unsplash.com/photo-1579758629938-03607ccdbaba" width="100%" style="margin-top:10px;">

  <!-- HISTORY -->
  <h3>Workout History</h3>
  <ul id="history"></ul>

  <button onclick="goBack()">← Back to Health</button>
</div>

<script>

// 🔙 Go back
function goBack() {
  window.location.href = "index.html";
}

// 💾 Save workout
function saveWorkout() {
  let workout = document.getElementById("workout").value;
  let minutes = document.getElementById("minutes").value;

  if (!workout || !minutes) {
    alert("Enter all details!");
    return;
  }

  let data = JSON.parse(localStorage.getItem("fitnessData")) || [];

  let today = new Date().toLocaleDateString();

  data.push({
    date: today,
    workout: workout,
    minutes: minutes
  });

  localStorage.setItem("fitnessData", JSON.stringify(data));

  showHistory();

  document.getElementById("workout").value = "";
  document.getElementById("minutes").value = "";
}

// 📜 Show history
function showHistory() {
  let list = document.getElementById("history");
  list.innerHTML = "";

  let data = JSON.parse(localStorage.getItem("fitnessData")) || [];

  data.forEach((item, index) => {
    let li = document.createElement("li");

    li.innerHTML = `
      ${item.date} - ${item.workout} (${item.minutes} mins)
      <button onclick="deleteItem(${index})">❌</button>
    `;

    list.appendChild(li);
  });
}

// ❌ Delete workout
function deleteItem(index) {
  let data = JSON.parse(localStorage.getItem("fitnessData")) || [];
  data.splice(index, 1);
  localStorage.setItem("fitnessData", JSON.stringify(data));
  showHistory();
}

// 🔄 Load history on page load
window.onload = showHistory;

</script>

</body>
</html>
