<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workout Dashboard</title>
<link rel="stylesheet" href="design.css">
</head>
<body>

<div class="container">
  <h1>Workout Dashboard</h1>
  <p>Track your daily progress</p>

  <input type="text" id="workout" placeholder="Workout Type">
  <input type="number" id="minutes" placeholder="Minutes">

  <button onclick="saveWorkout()">Save Workout</button>

  <hr>

  <h3>Progress Summary</h3>
  <p id="summary"></p>

  <h3>Workout History</h3>
  <ul id="history"></ul>

  <button onclick="goBack()">← Back to Health</button>
</div>

<script>
function goBack(){
 window.location.href="index.html";
}

function saveWorkout(){
 let workout=document.getElementById("workout").value;
 let minutes=document.getElementById("minutes").value;

 if(!workout || !minutes){
   alert("Enter details");
   return;
 }

 let data=JSON.parse(localStorage.getItem("fitnessData")) || [];

 let today=new Date().toLocaleDateString();

 data.push({
   date:today,
   workout:workout,
   minutes:Number(minutes)
 });

 localStorage.setItem("fitnessData",JSON.stringify(data));

 document.getElementById("workout").value="";
 document.getElementById("minutes").value="";

 showHistory();
}

function showHistory(){
 let list=document.getElementById("history");
 let summary=document.getElementById("summary");

 list.innerHTML="";

 let data=JSON.parse(localStorage.getItem("fitnessData")) || [];

 let totalMinutes=0;

 data.forEach((item,index)=>{
   totalMinutes += item.minutes;

   let li=document.createElement("li");

   li.innerHTML =
   item.date + " - " + item.workout + " (" + item.minutes + " mins) " +
   '<button onclick="deleteItem('+index+')">❌</button>';

   list.appendChild(li);
 });

 let totalWorkouts=data.length;
 let lastWorkout= totalWorkouts>0 ? data[data.length-1].workout : "No workout yet";

 summary.innerHTML =
 "Total Workouts: " + totalWorkouts +
 "<br>Total Minutes: " + totalMinutes +
 "<br>Last Workout: " + lastWorkout;
}

function deleteItem(index){
 let data=JSON.parse(localStorage.getItem("fitnessData")) || [];
 data.splice(index,1);
 localStorage.setItem("fitnessData",JSON.stringify(data));
 showHistory();
}

window.onload=showHistory;
</script>

</body>
</html>
