<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & Fitness Tracker</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

  <div class="container">
    <h1>Health & Fitness Tracker</h1>
    <p>Check your BMI and stay healthy!</p>

    <input type="number" id="height" placeholder="Enter height (cm)">
    <input type="number" id="weight" placeholder="Enter weight (kg)">

    <button id="calcBtn">Calculate BMI</button>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
