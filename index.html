<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & Fitness Tracker</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

  <div class="container">
    <h1>Health & Fitness Tracker</h1>
    <p>Track your health and stay fit!</p>

    <!-- USER INPUTS -->
    <input type="number" id="age" placeholder="Enter age">
    <input type="number" id="height" placeholder="Enter height (cm)">
    <input type="number" id="weight" placeholder="Enter weight (kg)">

    <button id="calcBtn">Check Health</button>

    <!-- RESULTS -->
    <h2 id="result"></h2>
    <p id="suggestion"></p>

    <hr>

    <!-- WORKOUT TRACKER -->
    <h3>Daily Workout Tracker</h3>

    <input type="text" id="workout" placeholder="What workout did you do?">
    <input type="number" id="minutes" placeholder="Minutes">

    <button id="saveBtn">Save Today's Activity</button>

    <ul id="history"></ul>
  </div>

  <script src="script.js"></script>

</body>
</html>
