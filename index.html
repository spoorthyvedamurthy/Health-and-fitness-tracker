<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Health Tracker</title>
  <link rel="stylesheet" href="design.css">
</head>
<body>

<div class="container">
  <h1>Health Tracker</h1>

  <input type="number" id="age" placeholder="Age">
  <input type="number" id="height" placeholder="Height (cm)">
  <input type="number" id="weight" placeholder="Weight (kg)">

  <button onclick="calculate()">Check Health</button>

  <h2 id="result"></h2>
  <p id="suggestion"></p>

  <hr>

  <!-- NAVIGATION -->
  <button onclick="goToWorkout()">Go to Workout Tracker →</button>
</div>

<script>
function calculate() {
  let age = document.getElementById("age").value;
  let height = document.getElementById("height").value / 100;
  let weight = document.getElementById("weight").value;

  if (!age || !height || !weight) {
    document.getElementById("result").innerText = "Enter all fields!";
    return;
  }

  let bmi = (weight / (height * height)).toFixed(2);

  let status = "";
  let suggestion = "";

  if (bmi < 18.5) {
    status = "Underweight";
    suggestion = "Eat more nutritious food.";
  } else if (bmi < 24.9) {
    status = "Normal";
    suggestion = "Maintain your lifestyle.";
  } else if (bmi < 29.9) {
    status = "Overweight";
    suggestion = "Exercise more.";
  } else {
    status = "Obese";
    suggestion = "Follow a strict fitness plan.";
  }

  let bodyFat = (1.2 * bmi + 0.23 * age - 5.4).toFixed(2);
  let calories = weight * 30;

  document.getElementById("result").innerText =
    `BMI: ${bmi} (${status})`;

  document.getElementById("suggestion").innerText =
    `Body Fat: ${bodyFat}% | Calories: ${calories} kcal | ${suggestion}`;
}

function goToWorkout() {
  window.location.href = "workout.html";
}
</script>

</body>
</html>
